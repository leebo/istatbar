name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "MARKETING_VERSION" project.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version: $VERSION"

      - name: Build
        run: |
          xcodebuild -project iStatBar.xcodeproj -scheme iStatBar -configuration Release build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO -derivedDataPath ./DerivedData 2>&1 | tee build.log

      - name: Verify build
        run: |
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
            grep -E "error:" build.log | head -10
            exit 1
          fi

      - name: Package app
        id: package
        run: |
          VER=${{ steps.version.outputs.version }}
          cd DerivedData/Build/Products/Release
          zip -r iStatBar-${VER}.zip iStatBar.app
          echo "path=$(pwd)/iStatBar-${VER}.zip" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iStatBar-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.path }}
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          VER=${{ steps.version.outputs.version }}
          gh release delete "v${VER}" --yes 2>/dev/null || true
          gh tag -d "v${VER}" 2>/dev/null || true
          gh release create "v${VER}" "${{ steps.package.outputs.path }}" \
            --title "iStatBar v${VER}" \
            --notes "macOS menu bar CPU/Memory/Disk/Network monitor"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
