name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project iStatBar.xcodeproj -scheme iStatBar -configuration Debug build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO 2>&1 | tail -20

      - name: Verify build
        run: |
          if [ -d build/Build/Products/Debug/iStatBar.app ]; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
            exit 1
          fi
