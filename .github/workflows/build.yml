name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup XcodeGen
        run: |
          which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project iStatBar.xcodeproj -scheme iStatBar -configuration Debug build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO -derivedDataPath ./DerivedData 2>&1 | tee build.log

      - name: Check result
        run: |
          if grep -q "BUILD SUCCEEDED" build.log; then
            echo "✅ Build successful"
          else
            echo "❌ Build failed"
            grep -E "error:" build.log | head -10
            exit 1
          fi
